services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: re_postgres
    environment:
      POSTGRES_DB: realestate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: re_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Geocoder: Nominatim with Lithuania-only OSM extract.
  # First boot downloads ~250MB and indexes for ~5–10 minutes.
  # After that, instant. Endpoint: http://localhost:7070/search?q=...
  nominatim:
    image: mediagis/nominatim:4.4
    container_name: re_nominatim
    environment:
      PBF_URL: https://download.geofabrik.de/europe/lithuania-latest.osm.pbf
      REPLICATION_URL: https://download.geofabrik.de/europe/lithuania-updates/
      NOMINATIM_PASSWORD: nominatim
      IMPORT_WIKIPEDIA: "false"
      THREADS: 2
    ports:
      - "7070:8080"
    volumes:
      - nominatim_data:/var/lib/postgresql/14/main
    shm_size: 2gb
    deploy:
      resources:
        limits:
          memory: 4g

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: re_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: re_celery_worker
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    env_file: .env
    depends_on:
      - backend

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: re_celery_beat
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file: .env
    depends_on:
      - backend

  # Scrapy is run on demand from your host or via:
  #   docker compose run --rm scrapers scrapy crawl domoplius
  scrapers:
    build:
      context: ./scrapers
      dockerfile: Dockerfile
    container_name: re_scrapers
    volumes:
      - ./scrapers:/app
      - ./backend:/backend  # so the Django ORM pipeline can import models
    env_file: .env
    profiles: ["manual"]   # don't auto-start with `docker compose up`
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: re_frontend
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm dev --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      PUBLIC_API_URL: http://localhost:8000/api

  mailhog:
    image: mailhog/mailhog:latest
    container_name: re_mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI

volumes:
  postgres_data:
  redis_data:
  nominatim_data:
  frontend_node_modules:
